<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="140" fill="url(#g)" />
  
  <g filter="url(#shadow)" transform="translate(106, 106)">
    <!-- Convergent/Divergent arrows forming an X -->
    <path d="M50 50 L250 250" stroke="white" stroke-width="60" stroke-linecap="round" />
    <path d="M250 50 L50 250" stroke="white" stroke-width="60" stroke-linecap="round" />
    
    <!-- Arrow heads -->
    <path d="M250 250 L190 250 L250 190 Z" fill="white" />
    <path d="M50 50 L110 50 L50 110 Z" fill="white" />
    <path d="M250 50 L190 50 L250 110 Z" fill="white" />
    <path d="M50 250 L110 250 L50 190 Z" fill="white" />
  </g>
</svg>
